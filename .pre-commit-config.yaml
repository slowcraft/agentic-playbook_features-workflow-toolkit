# Security + hygiene hooks for the marketplace plugin repo.
# Markdown + JSON only — no Python toolchain configured.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
      - id: check-case-conflict
      - id: trailing-whitespace
      - id: end-of-file-fixer

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        # \.git/.* + COMMIT_EDITMSG/MERGE_MSG — git internals; commit messages
        #   reference 7-char SHAs which detect-secrets flags as
        #   HexHighEntropyString.
        exclude: '^(\.git/.*|.*COMMIT_EDITMSG$|.*MERGE_MSG$)'

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        stages: [pre-commit, commit-msg, pre-push]
        args: ['--config', 'gitleaks.toml']

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        # Restricted to pre-commit stage only — first push of a branch
        # otherwise runs against every changed file in the branch's full
        # history, surfacing pre-existing warnings unrelated to the
        # current change.
        stages: [pre-commit]
        args: ['--severity=warning']
